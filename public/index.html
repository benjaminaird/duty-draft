<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>DutyDraft</title>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png"/>
<link rel="shortcut icon" href="/favicon.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;600;700&family=Courier+Prime:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090d;--s1:#0c0f16;--s2:#111620;--s3:#171d2a;
  --border:#1e2535;--border2:#28304a;--text:#dde4f0;--muted:#566078;--dim:#2e3a52;
  --accent:#c8a84b;--a2:#e8c870;--green:#27ae60;--red:#e74c3c;--blue:#3498db;--orange:#e67e22;
  --fh:'Oswald',sans-serif;--fb:'Source Sans 3',sans-serif;--fm:'Courier Prime',monospace;
}
body.light{
  --bg:#f4f1ec;--s1:#ffffff;--s2:#faf8f5;--s3:#ede9e1;
  --border:#d8d0c4;--border2:#c4bab0;--text:#1a2035;--muted:#6b6560;--dim:#a09890;
  --accent:#b8962e;--a2:#c8a84b;--green:#1e8a4a;--red:#c0392b;--blue:#2471a3;--orange:#ca6f1e;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:16px;min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{min-height:100vh;display:flex;flex-direction:column;max-width:860px;margin:0 auto;}
.hdr{background:var(--s1);border-bottom:2px solid var(--accent);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.7);}
.logo{font-family:var(--fh);font-size:24px;letter-spacing:4px;color:var(--accent);line-height:1;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.phase-chip{font-family:var(--fh);font-size:9px;letter-spacing:1.5px;background:var(--accent);color:#000;padding:3px 8px;border-radius:2px;white-space:nowrap;}
.demo-label{font-family:var(--fh);font-size:9px;letter-spacing:1px;color:var(--orange);white-space:nowrap;}
.demo-sel{background:var(--s3);border:1px solid var(--orange);border-radius:3px;color:var(--orange);font-family:var(--fh);font-size:9px;padding:3px 6px;outline:none;cursor:pointer;max-width:130px;}
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:var(--fh);font-size:10px;letter-spacing:1px;padding:9px 11px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.main{flex:1;padding:12px;overflow-y:auto;}
.card{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px;}
.card-title{font-family:var(--fh);font-size:16px;letter-spacing:2px;color:var(--accent);margin-bottom:2px;}
.card-sub{color:var(--muted);font-size:13px;margin-bottom:10px;line-height:1.5;}
.btn{font-family:var(--fh);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;padding:7px 12px;transition:all .15s;display:inline-flex;align-items:center;gap:4px;}
.btn-gold{background:var(--accent);color:#000;}.btn-gold:hover{background:var(--a2);}
.btn-red{background:#3a0a0a;color:#fca5a5;border:1px solid #7a1515;}.btn-red:hover{background:var(--red);color:#fff;}
.btn-grn{background:#0a2015;color:var(--green);border:1px solid #1a5030;}.btn-grn:hover{background:var(--green);color:#000;}
.btn-ghost{background:var(--s3);color:var(--text);border:1px solid var(--border2);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-orange{background:#1a0e00;color:var(--orange);border:1px solid var(--orange);}.btn-orange:hover{background:var(--orange);color:#000;}
.btn-sm{padding:4px 8px;font-size:9px;}.btn:disabled{opacity:.3;cursor:not-allowed;}.btn-full{width:100%;justify-content:center;}
.btn-icon{padding:4px 7px;background:var(--s3);border:1px solid var(--border2);border-radius:3px;cursor:pointer;color:var(--muted);font-size:12px;transition:all .15s;line-height:1;}
.btn-icon:hover{color:var(--accent);border-color:var(--accent);}
.btn-icon:disabled{opacity:.2;cursor:not-allowed;}
.field{margin-bottom:8px;}
.lbl{display:block;font-family:var(--fh);font-size:9px;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px;}
.inp,.sel,.ta{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-family:var(--fb);font-size:14px;padding:7px 10px;outline:none;transition:border-color .15s;}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--accent);}
.ta{resize:vertical;min-height:60px;}
.ii{background:var(--bg);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-size:13px;padding:5px 8px;outline:none;font-family:var(--fb);}
.ii:focus{border-color:var(--accent);}
.timer-pills{display:flex;gap:8px;margin-top:6px;}
.timer-pill{flex:1;padding:8px 4px;text-align:center;border-radius:4px;cursor:pointer;font-family:var(--fh);font-size:18px;background:var(--s3);border:2px solid var(--border2);color:var(--muted);transition:all .15s;user-select:none;}
.timer-pill.selected{background:#1a1200;border-color:var(--accent);color:var(--accent);}
.timer-pill-label{font-size:8px;letter-spacing:1px;margin-top:2px;font-family:var(--fh);}
.mrow{display:flex;align-items:center;gap:5px;padding:6px 8px;background:var(--s1);border:1px solid var(--border);border-radius:4px;margin-bottom:4px;}
.mrow-num{font-family:var(--fh);font-size:14px;color:var(--dim);min-width:18px;text-align:right;flex-shrink:0;}
/* Drag handle */
.drag-handle{cursor:grab;color:var(--dim);font-size:14px;padding:3px 4px;touch-action:none;flex-shrink:0;user-select:none;-webkit-user-select:none;line-height:1;transition:color .15s;}
.drag-handle:hover{color:var(--accent);}
.drag-handle.active{cursor:grabbing;color:var(--accent);}
.mrow.drag-over{border-color:var(--accent);background:var(--s3);}
.mrow.dragging{opacity:.3;border:1px dashed var(--accent);}
/* Pills switcher */
.pill-switch{display:flex;gap:6px;margin-bottom:12px;}
.pill-sw{font-family:var(--fh);font-size:10px;letter-spacing:1px;padding:6px 14px;border-radius:20px;cursor:pointer;border:2px solid var(--border2);background:var(--s3);color:var(--muted);transition:all .15s;}
.pill-sw.on{border-color:var(--accent);background:#160f00;color:var(--accent);}
/* Calendar */
.cal-wrap{margin-top:6px;}
.cal-mhdr{font-family:var(--fh);font-size:13px;letter-spacing:3px;color:var(--accent);text-align:center;margin-bottom:6px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-family:var(--fh);font-size:8px;letter-spacing:1px;color:var(--muted);text-align:center;padding:2px 0;}
.cc{min-height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:3px;border:1px solid transparent;transition:all .12s;position:relative;padding:2px 1px;user-select:none;font-size:11px;font-weight:600;}
.cc.empty{cursor:default;background:none;}
.cc.avail{background:var(--s3);border-color:var(--border2);color:var(--text);cursor:pointer;}
.cc.avail:hover{border-color:var(--accent);color:var(--accent);}
.cc.avail-wk{background:#181208;border-color:#3d2e08;color:#c8a84b;cursor:pointer;}
.cc.avail-wk:hover{border-color:var(--a2);}
.cc.pref{background:#071a0f;border-color:var(--green);color:var(--green);cursor:pointer;}
.cc.pref-wk{background:#0f1a05;border-color:#4a8020;color:#8fbc44;cursor:pointer;}
.cc.grey{background:#090a0d;border-color:#111318;color:#1e2028;cursor:not-allowed;}
.cc.na-red{background:#130303;border-color:#3a0a0a;color:var(--red);cursor:not-allowed;}
.cc.bo{background:#100606;border-color:#280e0e;color:#331010;cursor:not-allowed;}
.cc.wk-cfg{background:#181208;border-color:#3d2e08;color:#c8a84b;cursor:pointer;}
.cc.workday{background:var(--s3);border-color:var(--blue);color:var(--blue);cursor:pointer;}
.cc.pre-assigned{background:#0d0515;border-color:#6a1a9a;color:#c084fc;cursor:not-allowed;}
.cc.top5-sel{background:#071a0f;border-color:var(--green);color:var(--green);cursor:pointer;}
.cc.top5-grey{background:#090a0d;border-color:#111318;color:#1e2028;cursor:not-allowed;}
.cc.assigned{background:#071a0f;border-color:#1a5030;color:var(--green);cursor:default;}
.cc.pending{background:#1a1500;border-color:var(--accent);color:var(--accent);cursor:pointer;box-shadow:0 0 0 2px rgba(200,168,75,.25);}
.cc.paused{background:#0a0a0a;border-color:var(--muted);color:var(--muted);cursor:not-allowed;}
.c-prio{position:absolute;top:1px;right:2px;font-family:var(--fh);font-size:8px;color:var(--green);}
.c-lbl{font-size:6px;color:var(--muted);text-align:center;max-width:100%;line-height:1.1;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-num{font-size:11px;}
.confirm-bar{position:sticky;bottom:0;background:var(--s1);border-top:2px solid var(--accent);padding:10px 12px;display:flex;align-items:center;gap:8px;z-index:50;}
.confirm-bar-date{font-family:var(--fh);font-size:14px;color:var(--accent);letter-spacing:1px;}
.confirm-bar-sub{font-size:10px;color:var(--muted);}
.draft-banner{background:linear-gradient(135deg,#1a1200 0%,#0a1500 100%);border-bottom:2px solid var(--accent);padding:10px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:90;}
.draft-banner.paused-banner{background:linear-gradient(135deg,#0d0d0d 0%,#111 100%);border-bottom-color:var(--muted);}
.draft-banner-name{font-family:var(--fh);font-size:18px;letter-spacing:2px;color:var(--accent);}
.draft-banner-sub{font-size:10px;color:var(--muted);font-family:var(--fh);letter-spacing:1px;}
.draft-banner-timer{font-family:var(--fm);font-size:20px;color:var(--accent);margin-left:auto;flex-shrink:0;}
.draft-banner-timer.urg{color:var(--red);}
.draft-banner-pick{font-family:var(--fh);font-size:10px;color:var(--orange);letter-spacing:1px;margin-top:2px;}
.cdwn{font-family:var(--fm);font-size:16px;color:var(--accent);background:var(--s3);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;text-align:center;letter-spacing:2px;margin-bottom:10px;}
.cdwn.urg{color:var(--red);border-color:var(--red);}
.cdwn-labels{display:flex;justify-content:center;font-family:var(--fh);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.cdwn-seg{min-width:38px;text-align:center;}
.dbox{background:linear-gradient(135deg,#120f04 0%,#04110a 100%);border:1px solid var(--accent);border-radius:6px;padding:12px;margin-bottom:10px;}
.dbox.paused{background:#0d0d0d;border-color:var(--muted);}
.d-rank{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:1px;}
.d-name{font-family:var(--fh);font-size:26px;letter-spacing:3px;color:var(--accent);}
.d-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;flex-wrap:wrap;}
.trblock{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.tring{position:relative;width:56px;height:56px;}
.tring svg{transform:rotate(-90deg);}
.tnum{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fh);font-size:16px;color:var(--accent);}
.tlbl{font-size:7px;color:var(--muted);letter-spacing:1px;font-family:var(--fh);}
.urg .tnum{color:var(--red);}
.ahead-badge{background:var(--s3);border:1px solid var(--border2);border-radius:4px;padding:8px 12px;text-align:center;margin-bottom:10px;}
.ahead-num{font-family:var(--fh);font-size:32px;color:var(--accent);line-height:1;}
.ahead-label{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:3px;}
.pill{font-family:var(--fh);font-size:8px;letter-spacing:1px;padding:2px 6px;border-radius:2px;display:inline-block;}
.p-gold{background:#160f00;color:var(--accent);border:1px solid var(--accent);}
.p-grn{background:#061208;color:var(--green);border:1px solid var(--green);}
.p-red{background:#130303;color:var(--red);border:1px solid var(--red);}
.p-grey{background:var(--s3);color:var(--muted);border:1px solid var(--border2);}
.p-org{background:#150900;color:var(--orange);border:1px solid var(--orange);}
.p-blue{background:#020d18;color:var(--blue);border:1px solid var(--blue);}
.p-purple{background:#100520;color:#c084fc;border:1px solid #6a1a9a;}
.alert{border-radius:4px;padding:10px 12px;margin-bottom:9px;font-size:13px;line-height:1.5;}
.a-w{background:#160f00;border:1px solid var(--accent);color:#c8a84b;}
.a-d{background:#130303;border:1px solid var(--red);color:#fca5a5;}
.a-i{background:#030d18;border:1px solid var(--blue);color:#93c5fd;}
.a-g{background:#0a1a0f;border:1px solid var(--green);color:#86efac;}
.alert strong{display:block;font-family:var(--fh);font-size:10px;letter-spacing:1px;margin-bottom:2px;}
.wk-group{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px;}
.wk-group-title{font-family:var(--fh);font-size:12px;letter-spacing:1px;margin-bottom:6px;}
.wk-marine-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);}
.wk-marine-row:last-child{border-bottom:none;}
.freed-banner{background:#0a1a0f;border:1px solid var(--green);border-radius:4px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:var(--green);}
.freed-banner strong{display:block;font-family:var(--fh);font-size:10px;letter-spacing:1px;margin-bottom:2px;}
.pause-banner{background:#130303;border:1px solid var(--red);border-radius:4px;padding:10px 12px;margin-bottom:10px;font-family:var(--fh);font-size:12px;letter-spacing:1px;color:var(--red);text-align:center;}
.draft-cd-box{background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:16px;text-align:center;margin-bottom:10px;}
.draft-cd-label{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;}
.draft-cd-time{font-family:var(--fm);font-size:32px;color:var(--accent);letter-spacing:4px;}
.draft-cd-units{display:flex;justify-content:center;font-family:var(--fh);font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:4px;}
.draft-cd-seg{min-width:52px;text-align:center;}
.draft-cd-sub{font-size:11px;color:var(--muted);margin-top:8px;}
.short-banner{background:#130303;border:1px solid var(--red);border-radius:4px;padding:10px 12px;margin-bottom:10px;}
.short-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
.short-col-title{font-family:var(--fh);font-size:10px;letter-spacing:1px;margin-bottom:6px;}
.short-marine{font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);}
.short-marine:last-child{border-bottom:none;}
.nlist{display:flex;flex-direction:column;gap:6px;}
.ni{display:flex;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:8px;align-items:flex-start;}
.ni.unread{border-left:2px solid var(--accent);}
.ni-ico{font-size:14px;flex-shrink:0;}
.ni-title{font-weight:700;font-size:13px;font-family:var(--fh);letter-spacing:.5px;}
.ni-body{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.4;}
.rt{width:100%;border-collapse:collapse;}
.rt th{font-family:var(--fh);font-size:9px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);padding:5px;text-align:left;}
.rt td{padding:5px;border-bottom:1px solid var(--border);font-size:11px;}
.rt tr:last-child td{border-bottom:none;}
.wkstar{color:var(--accent);}
.seniority-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
.seniority-row:last-child{border-bottom:none;}
.seniority-name{font-family:var(--fh);font-size:11px;flex:1;}
.seniority-date{font-family:var(--fm);font-size:11px;color:var(--accent);}
.seniority-wk{color:var(--accent);font-size:10px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px;}
.modal{background:var(--s2);border:1px solid var(--border2);border-radius:6px;padding:16px;max-width:420px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-title{font-family:var(--fh);font-size:17px;letter-spacing:2px;color:var(--accent);margin-bottom:3px;}
hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rowb{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
.mt{margin-top:8px;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
/* Phase progress bar */
.phase-bar{display:flex;align-items:center;background:var(--s1);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.phase-bar::-webkit-scrollbar{display:none;}
.phase-step{display:flex;align-items:center;flex-shrink:0;}
.phase-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);border:1px solid var(--border2);transition:all .2s;flex-shrink:0;}
.phase-dot.done{background:var(--green);border-color:var(--green);}
.phase-dot.now{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px rgba(200,168,75,.5);}
.phase-dot-lbl{font-family:var(--fh);font-size:7px;letter-spacing:.5px;color:var(--dim);margin-top:2px;white-space:nowrap;}
.phase-dot-lbl.done{color:var(--green);}
.phase-dot-lbl.now{color:var(--accent);}
.phase-step-inner{display:flex;flex-direction:column;align-items:center;padding:5px 6px 4px;}
.phase-connector{width:14px;height:1px;background:var(--border2);flex-shrink:0;}
.phase-connector.done{background:var(--green);}
/* What to do now banner */
.now-banner{background:linear-gradient(135deg,var(--s1) 0%,var(--s3) 100%);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:4px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.now-banner.nb-green{border-left-color:var(--green);}
.now-banner.nb-blue{border-left-color:var(--blue);}
.now-banner.nb-red{border-left-color:var(--red);}
.now-banner-icon{font-size:18px;flex-shrink:0;}
.now-banner-head{font-family:var(--fh);font-size:10px;letter-spacing:1px;color:var(--accent);margin-bottom:2px;}
.now-banner.nb-green .now-banner-head{color:var(--green);}
.now-banner.nb-blue .now-banner-head{color:var(--blue);}
.now-banner.nb-red .now-banner-head{color:var(--red);}
.now-banner-body{font-size:13px;color:var(--text);line-height:1.4;}
/* Your turn overlay */
.your-turn-overlay{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.92);}
.your-turn-box{background:linear-gradient(135deg,#1a1200 0%,#071a0a 100%);border:2px solid var(--accent);border-radius:10px;padding:32px 28px;text-align:center;max-width:340px;width:90%;animation:ytpulse .6s ease-in-out;}
@keyframes ytpulse{0%{transform:scale(.92);opacity:0;}100%{transform:scale(1);opacity:1;}}
.your-turn-icon{font-size:48px;margin-bottom:12px;}
.your-turn-title{font-family:var(--fh);font-size:28px;letter-spacing:4px;color:var(--accent);margin-bottom:6px;}
.your-turn-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
/* Draft queue */
.queue-list{display:flex;flex-direction:column;gap:2px;margin-top:6px;}
.queue-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:3px;font-size:11px;}
.queue-row.done-row{color:var(--dim);background:none;}
.queue-row.now-row{background:#160f00;border:1px solid var(--accent);color:var(--accent);}
.queue-row.next-row{background:var(--s3);color:var(--text);}
.queue-row.upcoming-row{color:var(--muted);}
.queue-idx{font-family:var(--fh);font-size:9px;min-width:22px;text-align:right;}
.queue-name{flex:1;font-family:var(--fh);font-size:11px;}
/* Pick confirmation */
.pick-confirm{position:fixed;inset:0;z-index:250;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.88);}
.pick-confirm-box{background:var(--s2);border:1px solid var(--green);border-radius:8px;padding:28px 24px;text-align:center;max-width:320px;width:90%;animation:ytpulse .4s ease-in-out;}
.pick-confirm-icon{font-size:40px;margin-bottom:10px;}
.pick-confirm-date{font-family:var(--fh);font-size:26px;letter-spacing:3px;color:var(--accent);margin-bottom:4px;}
.pick-confirm-sub{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
/* Last updated */
.last-updated{font-family:var(--fh);font-size:8px;letter-spacing:1px;color:var(--dim);text-align:center;padding:4px 0 2px;}
/* Notif pulse */
@keyframes bellpulse{0%{transform:scale(1);}30%{transform:scale(1.25)rotate(-8deg);}60%{transform:scale(1.15)rotate(6deg);}100%{transform:scale(1)rotate(0);}}
.bell-pulse{animation:bellpulse .5s ease-in-out;}
/* NCOIC dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.dash-cell{background:var(--s3);border:1px solid var(--border2);border-radius:4px;padding:10px 8px;text-align:center;}
.dash-num{font-family:var(--fh);font-size:24px;color:var(--accent);line-height:1;}
.dash-lbl{font-family:var(--fh);font-size:8px;letter-spacing:1px;color:var(--muted);margin-top:3px;}
/* Export button */
@media print{.no-print{display:none!important;}.print-only{display:block!important;}}
/* Bugler illustration */
.bugler-wrap{text-align:center;padding:16px 0 8px;opacity:0.85;}
.bugler-img{width:140px;height:140px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6));}
/* Theme toggle */
.theme-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.theme-toggle-label{font-family:var(--fh);font-size:13px;letter-spacing:1px;color:var(--text);}
.theme-toggle-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--s3);border:1px solid var(--border2);border-radius:26px;cursor:pointer;transition:background .2s,border-color .2s;}
.toggle-track::before{content:'';position:absolute;width:20px;height:20px;left:2px;top:2px;background:var(--muted);border-radius:50%;transition:transform .2s,background .2s;}
.toggle-switch input:checked+.toggle-track{background:#1a1200;border-color:var(--accent);}
.toggle-switch input:checked+.toggle-track::before{transform:translateX(22px);background:var(--accent);}
body.light .toggle-switch input:checked+.toggle-track{background:#f5ecd0;border-color:var(--accent);}
body.light .toggle-switch input:checked+.toggle-track::before{background:var(--accent);}
@media(max-width:500px){.cc{min-height:36px;}.c-lbl{display:none;}.d-name{font-size:20px;}.timer-pill{font-size:16px;}.short-split{grid-template-columns:1fr;}}
.print-only{display:none;}
</style>

<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#c8a84b;font-family:'Courier Prime',monospace;letter-spacing:2px;font-size:14px;">LOADING DUTYDRAFT…</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const RANKS=['PVT','PFC','LCPL','CPL','SGT','SSGT','GYSGT'];
const RANK_TO_GRADE={PVT:'E1',PFC:'E2',LCPL:'E3',CPL:'E4',SGT:'E5',SSGT:'E6',GYSGT:'E7'};
const GRADE_NUM={E1:1,E2:2,E3:3,E4:4,E5:5,E6:6,E7:7};
const BURDEN_GROUP={E1:'junior',E2:'junior',E3:'junior',E4:'junior',E5:'junior',E6:'ssgt',E7:'gysgt'};
const GROUP_QUOTA={junior:0.60,ssgt:0.25,gysgt:0.15};
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const PHASE_ORDER=['setup','calendar','wkpreview','top5','nonavail','review','draft-scheduled','draft','postdraft','published'];
const NA_REASONS=['Approved Leave','On the Roster for a Gig','TAD','Parental Leave','Approved Out of Bounds Liberty','Other  --  Non-Sensitive Conflict','Other  --  Please Speak with SNCOIC in Person'];
const PL={setup:'ROSTER SETUP',calendar:'CAL CONFIG',wkpreview:'WK PREVIEW',shortmonth:'SHORT MONTH',top5:'PD / NA',nonavail:'PD / NA',review:'NCOIC REVIEW','draft-scheduled':'DRAFT SCHED',draft:'LIVE DRAFT',postdraft:'POST-DRAFT',published:'PUBLISHED'};
const TABS=[{id:'admin',label:'NCOIC'},{id:'pdna',label:'PD / NA'},{id:'draft',label:'DRAFT'},{id:'roster',label:'ROSTER'},{id:'notifs',label:'NOTIFS'},{id:'settings',label:'⚙'}];

const gradeOf=r=>RANK_TO_GRADE[r]||'E1';
const groupOf=r=>BURDEN_GROUP[gradeOf(r)]||'junior';
const gradeNum=r=>GRADE_NUM[gradeOf(r)]||1;
const dName=m=>m?`${m.rank} ${m.lastName}${m.firstName?' '+m.firstName:''}`.toUpperCase():'';
const dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const getDIM=(y,m)=>new Date(y,m+1,0).getDate();
const getFirstDow=(y,m)=>new Date(y,m,1).getDay();
const isNatWk=(y,m,d)=>{const w=new Date(y,m,d).getDay();return w===0||w===6;};
const isConsec=(d,list)=>list.some(a=>Math.abs(d-a)===1);
const consecPrev=(d,last,y,m)=>{if(last==null)return false;const lm=m===0?getDIM(y-1,11):getDIM(y,m-1);return last===lm&&d===1;};
const fmtCD=s=>{if(s<=0)return'00:00:00:00';return[Math.floor(s/86400),Math.floor((s%86400)/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');};

const api={
  getState:()=>fetch('/api/state').then(r=>r.json()),
  setState:d=>fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  addNotif:(title,body,icon,targetMid)=>fetch('/api/notif',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,body,icon:icon||'🔔',targetMid:targetMid||null})}).then(r=>r.json()),
  markRead:mid=>fetch('/api/notif/read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mid})}).then(r=>r.json()),
  startDraft:data=>fetch('/api/draft/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r=>r.json()),
  pick:(day,mid)=>fetch('/api/draft/pick',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({day,mid})}).then(r=>r.json()),
  pause:()=>fetch('/api/draft/pause',{method:'POST'}).then(r=>r.json()),
  resume:()=>fetch('/api/draft/resume',{method:'POST'}).then(r=>r.json()),
  restart:()=>fetch('/api/draft/restart',{method:'POST'}).then(r=>r.json()),
  reset:()=>fetch('/api/reset',{method:'POST'}).then(r=>r.json()),
};

function computeWkAssignees(marines,wkCount,history){
  if(!wkCount)return{junior:[],ssgt:[],gysgt:[]};
  const groups={junior:[],ssgt:[],gysgt:[]};
  marines.forEach(m=>groups[groupOf(m.rank)].push(m));
  const q={junior:Math.round(GROUP_QUOTA.junior*wkCount),ssgt:Math.round(GROUP_QUOTA.ssgt*wkCount),gysgt:0};
  q.gysgt=Math.max(0,wkCount-q.junior-q.ssgt);
  if(q.junior+q.ssgt+q.gysgt!==wkCount)q.junior+=wkCount-(q.junior+q.ssgt+q.gysgt);
  const result={junior:[],ssgt:[],gysgt:[]};let total=0;
  Object.entries(groups).forEach(([g,gMs])=>{
    if(!gMs.length||q[g]<=0)return;
    const hist=(history.weekendBurden||{})[g]||[];
    const sorted=[...gMs].sort((a,b)=>{const ai=hist.lastIndexOf(a.id),bi=hist.lastIndexOf(b.id);return ai!==bi?ai-bi:gradeNum(a.rank)-gradeNum(b.rank);});
    result[g]=sorted.slice(0,Math.min(q[g],sorted.length));total+=result[g].length;
  });
  while(total<wkCount){
    const hist=(history.weekendBurden||{}).junior||[];
    const sorted=[...groups.junior].sort((a,b)=>{const ai=hist.lastIndexOf(a.id),bi=hist.lastIndexOf(b.id);return ai!==bi?ai-bi:gradeNum(a.rank)-gradeNum(b.rank);});
    const have=new Set(result.junior.map(m=>m.id));
    const next=sorted.find(m=>!have.has(m.id));
    if(next){result.junior.push(next);total++;}else break;
  }
  return result;
}

function computeDoubleDuty(marines,totalDays,preAssigned,history){
  const preIds=new Set(Object.values(preAssigned));
  const elig=marines.filter(m=>!preIds.has(m.id));
  const rem=totalDays-Object.keys(preAssigned).length;
  if(rem<=elig.length)return{};
  const hist=history.extraDuty||[];
  const sorted=[...elig].sort((a,b)=>{const ai=hist.lastIndexOf(a.id),bi=hist.lastIndexOf(b.id);return ai!==bi?ai-bi:gradeNum(a.rank)-gradeNum(b.rank);});
  const dd={};sorted.slice(0,Math.min(rem-elig.length,4)).forEach(m=>{dd[m.id]=2;});return dd;
}

function computeShortMonthRoster(marines,availDays,preAssigned,history){
  const preIds=new Set(Object.values(preAssigned));
  const elig=marines.filter(m=>!preIds.has(m.id));
  const rem=availDays-Object.keys(preAssigned).length;
  const s={junior:Math.round(GROUP_QUOTA.junior*rem),ssgt:Math.round(GROUP_QUOTA.ssgt*rem),gysgt:0};
  s.gysgt=Math.max(0,rem-s.junior-s.ssgt);
  const diff=rem-(s.junior+s.ssgt+s.gysgt);if(diff)s.junior+=diff;
  const standing={junior:[],ssgt:[],gysgt:[]},sittingOut={junior:[],ssgt:[],gysgt:[]};
  ['junior','ssgt','gysgt'].forEach(g=>{
    const gMs=elig.filter(m=>groupOf(m.rank)===g);
    const hist=((history.dutyHistory)||{})[g]||[];
    const sorted=[...gMs].sort((a,b)=>{const ai=hist.lastIndexOf(a.id),bi=hist.lastIndexOf(b.id);return ai!==bi?ai-bi:gradeNum(a.rank)-gradeNum(b.rank);});
    const n=Math.max(0,Math.min(s[g],sorted.length));
    standing[g]=sorted.slice(0,n);sittingOut[g]=sorted.slice(n);
  });
  return{standing,sittingOut};
}

function buildDraftOrder(marines,doubleDuty,preAssigned){
  const preIds=new Set(Object.values(preAssigned));
  const elig=marines.filter(m=>!preIds.has(m.id));
  const ddGy=elig.filter(m=>m.rank==='GYSGT'&&doubleDuty[m.id]);
  const normGy=elig.filter(m=>m.rank==='GYSGT'&&!doubleDuty[m.id]);
  const ddNon=elig.filter(m=>m.rank!=='GYSGT'&&doubleDuty[m.id]);
  const rest=elig.filter(m=>m.rank!=='GYSGT'&&!doubleDuty[m.id]);
  const order=[];
  ddGy.forEach(m=>{order.push({id:m.id,turn:1});order.push({id:m.id,turn:2});});
  normGy.forEach(m=>order.push({id:m.id,turn:1}));
  ddNon.forEach(m=>{order.push({id:m.id,turn:1});order.push({id:m.id,turn:2});});
  rest.forEach(m=>order.push({id:m.id,turn:1}));
  return order;
}

function TimerRing({secs,total,paused}){
  const pct=Math.max(0,secs/Math.max(total,1)),r=24,circ=2*Math.PI*r,urgent=secs<=30&&!paused;
  const color=paused?'#566078':urgent?'#e74c3c':'#c8a84b';
  return(
    <div className={'trblock'+(urgent?' urg':'')}>
      <div className="tring">
        <svg width="56" height="56">
          <circle cx="28" cy="28" r={r} fill="none" stroke="#181828" strokeWidth="5"/>
          <circle cx="28" cy="28" r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round"/>
        </svg>
        <div className="tnum" style={{color}}>{paused?'⏸':secs}</div>
      </div>
      <div className="tlbl">{paused?'PAUSED':'SEC'}</div>
    </div>
  );
}

function CalGrid({year,month,renderCell}){
  const total=getDIM(year,month),first=getFirstDow(year,month);
  const cells=[];
  for(let i=0;i<first;i++)cells.push(<div key={'e'+i} className="cc empty"/>);
  for(let d=1;d<=total;d++)cells.push(renderCell(d));
  return(
    <div className="cal-wrap">
      <div className="cal-mhdr">{MONTHS[month].toUpperCase()} {year}</div>
      <div className="cal-grid">
        {DAYS_SHORT.map(d=><div key={d} className="cal-dow">{d}</div>)}
        {cells}
      </div>
    </div>
  );
}

function App(){
  const [st,setSt]=useState(null);
  const [tab,setTab]=useState('admin');
  const [pdnaTab,setPdnaTab]=useState('pd'); // 'pd' or 'na'
  const [activeUser,setActiveUser]=useState('ncoic');
  const [pendingDay,setPendingDay]=useState(null);
  const [wkWarnModal,setWkWarnModal]=useState(null);
  const [naModal,setNaModal]=useState(null);
  const [naWkWarn,setNaWkWarn]=useState(null);
  const [naReason,setNaReason]=useState(NA_REASONS[0]);
  const [dupModal,setDupModal]=useState(null);
  const [deleteModal,setDeleteModal]=useState(null);
  const [preAssignModal,setPreAssignModal]=useState(null);
  const [editDModal,setEditDModal]=useState(null);
  const [calMode,setCalMode]=useState(null);
  const [clearModal,setClearModal]=useState(null); // {type:'pd'|'na', mid}
  const [loading,setLoading]=useState(true);
  const [editRoster,setEditRoster]=useState(null);
  const [newMRank,setNewMRank]=useState('LCPL');
  const [draftDT,setDraftDT]=useState(()=>{const d=new Date();d.setDate(d.getDate()+1);d.setHours(8,0,0,0);return d.toISOString().slice(0,16);});
  const [myTurnAlert,setMyTurnAlert]=useState(false);
  const [pickConfirmed,setPickConfirmed]=useState(null); // {day, isWk, isDD}
  const [queueOpen,setQueueOpen]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(Date.now());
  const [bellPulse,setBellPulse]=useState(false);
  const [localSecs,setLocalSecs]=useState(0);
  const [darkMode,setDarkMode]=useState(()=>{
    try{return localStorage.getItem('dutydraft-theme')!=='light';}catch(e){return true;}
  });
  const [coName,setCoName]=useState(()=>{
    try{return localStorage.getItem('dutydraft-coname')||'N. D. MORRIS';}catch(e){return 'N. D. MORRIS';}
  });
  const prevUnreadRef=useRef(0);
  const localTimerRef=useRef(null);
  // Drag state
  const dragIdx=useRef(null);
  const [overIdx,setOverIdx]=useState(null);

  const naOtherRef=useRef(null);
  const preAssignMarineRef=useRef('');
  const preAssignReasonRef=useRef(null);
  const newLastRef=useRef(null);
  const newFirstRef=useRef(null);
  const dupFirstRef=useRef(null);
  const editDRef=useRef('');
  const stRef=useRef(null);
  const touchStartY=useRef(0);
  useEffect(()=>{stRef.current=st;},[st]);

  useEffect(()=>{
    if(darkMode){
      document.body.classList.remove('light');
      try{localStorage.setItem('dutydraft-theme','dark');}catch(e){}
    } else {
      document.body.classList.add('light');
      try{localStorage.setItem('dutydraft-theme','light');}catch(e){}
    }
  },[darkMode]);

  const pollRef=useRef(null);

  function forceRefresh(){
    api.getState().then(s=>{
      const newUnread=(s.notifications||[]).filter(n=>n.unread&&(activeUser==='ncoic'||!n.targetMid||n.targetMid===activeUser)).length;
      if(newUnread>prevUnreadRef.current){setBellPulse(true);setTimeout(()=>setBellPulse(false),600);}
      prevUnreadRef.current=newUnread;
      if(s.draftLive&&!s.draftDone&&activeUser!=='ncoic'){
        const e=(s.draftOrder||[])[s.draftIdx||0];
        const prev=stRef.current;
        const wasMyTurn=prev&&(prev.draftOrder||[])[prev.draftIdx||0]?.id===activeUser;
        if(e?.id===activeUser&&!wasMyTurn)setMyTurnAlert(true);
      }
      setSt(s);
      setLastUpdated(Date.now());
    }).catch(()=>{});
  }

  useEffect(()=>{
    api.getState().then(s=>{setSt(s);setEditRoster([...s.marines]);setLoading(false);})
      .catch(()=>{document.getElementById('root').innerHTML='<div style="padding:40px;color:#e74c3c;font-family:monospace;">⚠ Could not connect to server. <a href="/" style="color:#c8a84b;">Retry</a></div>';});
    pollRef.current=setInterval(forceRefresh,3000);
    return()=>clearInterval(pollRef.current);
  },[]);

  useEffect(()=>{
    if(!st)return;
    const map={setup:'admin',calendar:'admin',wkpreview:'admin',shortmonth:'admin',review:'admin','draft-scheduled':'draft',top5:'pdna',nonavail:'pdna',draft:'draft',postdraft:'roster',published:'roster'};
    setTab(map[st.phase]||'admin');
  },[st && st.phase]);

  // Snap localSecs to server value whenever server sends a new value
  useEffect(()=>{
    if(st?.draftLive&&!st?.draftDone){
      setLocalSecs(st.turnSecsRemaining||0);
    }
  },[st && st.turnSecsRemaining]);

  // Local tick  --  counts down every second, server snaps it every 3s
  useEffect(()=>{
    if(localTimerRef.current)clearInterval(localTimerRef.current);
    if(!st?.draftLive||st?.draftDone||st?.draftPaused){
      setLocalSecs(st?.turnSecsRemaining||0);
      return;
    }
    localTimerRef.current=setInterval(()=>{
      setLocalSecs(s=>Math.max(0,s-1));
    },1000);
    return()=>{if(localTimerRef.current)clearInterval(localTimerRef.current);};
  },[st && st.draftLive,st && st.draftDone,st && st.draftPaused,st && st.draftIdx]);

  function patch(updates){
    const next={...(stRef.current||st),...updates};
    setSt(next);
    stRef.current=next;
    return api.setState(updates);
  }

  // Pull-to-refresh
  function onTouchStart(e){touchStartY.current=e.touches[0].clientY;}
  function onTouchEnd(e){
    if(e.changedTouches[0].clientY-touchStartY.current>70){
      api.getState().then(s=>{setSt(s);setLastUpdated(Date.now());}).catch(()=>{});
    }
  }

  // Phase-aware "what do I do now" instruction
  function getPhaseInstruction(){
    if(!st)return null;
    const ph=st.phase,isNcoic=activeUser==='ncoic';
    const mid=isNcoic?null:activeUser;
    const myPrefs=mid?(st.prefs||{})[mid]||[]:[];
    const myNA=mid?(st.nonAvail||{})[mid]||[]:[];
    const myAsgn=Object.entries(st.assignments||{}).filter(([,x])=>x===mid).map(([d])=>Number(d));
    if(ph==='setup'&&isNcoic)return{icon:'📋',cls:'',head:'ACTION REQUIRED',body:'Configure the duty roster in seniority order, set the turn timer, then tap CONFIRM.'};
    if(ph==='calendar'&&isNcoic)return{icon:'📅',cls:'',head:'ACTION REQUIRED',body:'Set blackout dates, designate any weekend-style days or workdays, assign pre-assigned duties if needed, then tap CONFIRM.'};
    if(ph==='wkpreview'&&isNcoic)return{icon:'👀',cls:'nb-blue',head:'REVIEW REQUIRED',body:'Review the weekend duty assignments by group. Confirm to send notifications and open the submission window.'};
    if(ph==='shortmonth'&&isNcoic)return{icon:'⚠',cls:'nb-red',head:'SHORT MONTH',body:'Fewer duty days than Marines. Review the standing/sitting split, then confirm to notify the roster.'};
    if((ph==='top5'||ph==='nonavail')&&isNcoic)return{icon:'⏳',cls:'nb-blue',head:'WAITING ON SUBMISSIONS',body:`Marines are submitting preferred dates and non-availability. Close submissions when ready.`};
    if(ph==='review'&&isNcoic)return{icon:'🛡',cls:'',head:'ACTION REQUIRED',body:'Review and approve non-availability requests. Schedule the draft when ready.'};
    if(ph==='draft-scheduled'&&isNcoic)return{icon:'⏱',cls:'nb-blue',head:'DRAFT SCHEDULED',body:'Draft will launch automatically. You can launch early using the button on the Draft tab.'};
    if((ph==='draft')&&isNcoic)return{icon:'🎯',cls:'',head:'DRAFT IN PROGRESS',body:'Monitor the draft. Use PAUSE or RESTART controls if needed. Review and publish when complete.'};
    if(ph==='postdraft'&&isNcoic)return{icon:'🔒',cls:'nb-green',head:'READY TO PUBLISH',body:'Review the roster on the ROSTER tab. Tap PUBLISH to finalize and notify all duties.'};
    if(ph==='published'&&isNcoic)return{icon:'✅',cls:'nb-green',head:'ROSTER PUBLISHED',body:'The roster is live. All duties have been notified. Next month, use Settings to reset.'};
    if(!mid)return null;
    if(ph==='top5'||ph==='nonavail'){
      const hasPD=myPrefs.length>0,hasNA=myNA.length>0;
      if(!hasPD&&!hasNA)return{icon:'📅',cls:'nb-blue',head:'YOUR TURN TO SUBMIT',body:'Tap PD / NA above to submit your preferred duty dates (up to 10) and any non-availability requests before the deadline.'};
      if(hasPD&&!hasNA)return{icon:'📅',cls:'nb-green',head:'PREFERRED DATES SUBMITTED',body:`${myPrefs.length} date${myPrefs.length!==1?'s':''} submitted. Switch to Non-Availability if you have dates you cannot stand duty.`};
      return{icon:'✅',cls:'nb-green',head:'SUBMISSIONS IN',body:`${myPrefs.length} preferred date${myPrefs.length!==1?'s':''} · ${myNA.length} N/A request${myNA.length!==1?'s':''}. Wait for NCOIC to schedule the draft.`};
    }
    if(ph==='draft-scheduled')return{icon:'⏳',cls:'nb-blue',head:'DRAFT SCHEDULED',body:'The draft will launch automatically. You will be notified when it is your turn to pick.'};
    if(ph==='draft'){
      const e=(st.draftOrder||[])[st.draftIdx||0];
      if(e?.id===mid)return{icon:'⭐',cls:'nb-red',head:'IT IS YOUR TURN',body:'Go to the DRAFT tab now and select your duty date. The timer is running.'};
      if(myAsgn.length>0)return{icon:'✅',cls:'nb-green',head:'DATE ASSIGNED',body:`You are assigned ${MONTHS[st.month]} ${myAsgn.join(' & ')}. Watch the calendar fill up on the DRAFT tab.`};
      const idx=(st.draftOrder||[]).findIndex((en,i)=>i>(st.draftIdx||0)&&en.id===mid);
      const ahead=idx===-1?null:idx-(st.draftIdx||0);
      return{icon:'⏳',cls:'nb-blue',head:'WAITING YOUR TURN',body:ahead!==null?`${ahead} pick${ahead!==1?'s':''} ahead of you. Watch the DRAFT tab  --  your preferred dates are highlighted.`:'Standby for your turn in the draft.'};
    }
    if(ph==='postdraft'||ph==='published'){
      if(myAsgn.length>0)return{icon:'✅',cls:'nb-green',head:'YOUR DUTY DATE',body:`${myAsgn.map(d=>`${MONTHS[st.month]} ${d}`).join(' & ')}${myAsgn.some(d=>isWkDate(d))?'  --  includes a weekend day.':''}`};
    }
    return null;
  }

  function isWkDate(d){
    if(!st)return false;
    const k=dk(st.year,st.month,d);
    if((st.workdays||[]).includes(k))return false;
    return isNatWk(st.year,st.month,d)||(st.extraWk||[]).includes(k);
  }
  function getAllDates(){
    if(!st)return[];
    const total=getDIM(st.year,st.month);
    return Array.from({length:total},(_,i)=>i+1).filter(d=>!(st.blackouts||[]).includes(dk(st.year,st.month,d)));
  }
  function currentNeedsWk(mid,turn,asgn){
    if(!st)return false;
    const isDD=!!(st.doubleDuty||{})[mid];
    const isWkSlotted=(st.wkAssigneeIds||[]).includes(mid);
    const isFreed=(st.freedMarines||[]).includes(mid);
    if(!isWkSlotted||isFreed)return false;
    const myDays=Object.entries(asgn||{}).filter(([,x])=>x===mid).map(([d])=>Number(d));
    const hasWk=myDays.some(d=>(st.weekendDates||[]).includes(d));
    if(hasWk)return false;
    // Safety net: if no weekend dates are still available, waive the obligation
    // (server will also detect this and add to freedMarines on next poll)
    const availWk=(st.weekendDates||[]).filter(d=>!asgn[d]||asgn[d]===mid);
    if(!availWk.length)return false;
    return isDD?turn===1:true;
  }

  function insertPositionForRank(roster,rank){
    const g=GRADE_NUM[gradeOf(rank)]||1;
    let last=-1;
    for(let i=0;i<roster.length;i++){if(GRADE_NUM[gradeOf(roster[i].rank)]===g)last=i;}
    if(last>=0)return last+1;
    for(let i=0;i<roster.length;i++){if(GRADE_NUM[gradeOf(roster[i].rank)]<g)return i;}
    return roster.length;
  }

  const PHASE_BACK={calendar:'setup',shortmonth:'calendar',wkpreview:'calendar',review:'top5'};
  function goBackPhase(){
    const prev=PHASE_BACK[st.phase];
    if(prev)patch({phase:prev});
  }
  function BackBtn(){
    if(!PHASE_BACK[st.phase])return null;
    return <button className="btn btn-ghost btn-sm" onClick={goBackPhase}>← BACK</button>;
  }

  // ── DRAG HANDLERS ────────────────────────────────────────────────────────
  function onDragStart(e,idx){
    dragIdx.current=idx;
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',idx);
  }
  function onDragOver(e,idx){e.preventDefault();setOverIdx(idx);}
  function onDrop(e,idx){
    e.preventDefault();
    const from=dragIdx.current;
    if(from===null||from===idx){dragIdx.current=null;setOverIdx(null);return;}
    setEditRoster(r=>{const a=[...r];const[item]=a.splice(from,1);a.splice(idx,0,item);return a;});
    dragIdx.current=null;setOverIdx(null);
  }
  function onDragEnd(){dragIdx.current=null;setOverIdx(null);}

  // ── SETUP ────────────────────────────────────────────────────────────────
  function Setup(){
    const er=editRoster||marines;
    function moveUp(i){if(!i)return;setEditRoster(r=>{const a=[...r];[a[i-1],a[i]]=[a[i],a[i-1]];return a;});}
    function moveDown(i){if(i===er.length-1)return;setEditRoster(r=>{const a=[...r];[a[i],a[i+1]]=[a[i+1],a[i]];return a;});}
    function updateM(id,f,v){setEditRoster(r=>r.map(m=>m.id===id?{...m,[f]:['lastName','firstName'].includes(f)?v.toUpperCase():v}:m));}
    function addM(){
      const ln=(newLastRef.current?.value||'').toUpperCase().trim();
      const fn=(newFirstRef.current?.value||'').toUpperCase().trim();
      if(!ln)return;
      const dup=er.find(m=>m.lastName===ln);
      if(dup){setDupModal({lastName:ln,rank:newMRank,fn,existing:dup});return;}
      const pos=insertPositionForRank(er,newMRank);
      setEditRoster(r=>{const a=[...r];a.splice(pos,0,{rank:newMRank,lastName:ln,firstName:fn,id:'m'+Date.now(),active:true});return a;});
      if(newLastRef.current)newLastRef.current.value='';
      if(newFirstRef.current)newFirstRef.current.value='';
    }
    function resolvedup(){
      const fn=(dupFirstRef.current?.value||'').toUpperCase().trim();
      if(!fn||er.find(m=>m.lastName===dupModal.lastName&&m.firstName===fn))return;
      const pos=insertPositionForRank(er,dupModal.rank);
      setEditRoster(r=>{const a=[...r];a.splice(pos,0,{rank:dupModal.rank,lastName:dupModal.lastName,firstName:fn,id:'m'+Date.now(),active:true});return a;});
      setDupModal(null);
    }
    async function confirm(){
      const next=er.filter(m=>m.active);
      await patch({marines:next,phase:'calendar'});
      await api.addNotif('ROSTER SET',`${next.length} duties configured for ${MONTHS[st.month]} ${st.year}.`,'📋');
    }
    return(
      <div>
        {dupModal&&(<div className="overlay"><div className="modal">
          <div className="modal-title">DUPLICATE NAME</div>
          <div className="card-sub">{dupModal.rank} {dupModal.lastName} already exists. Add a first name to differentiate.</div>
          <div className="field"><label className="lbl">First Name</label><input className="inp" ref={dupFirstRef} placeholder="First name..." autoFocus/></div>
          <div className="row mt"><button className="btn btn-gold" onClick={resolvedup}>ADD</button><button className="btn btn-ghost" onClick={()=>setDupModal(null)}>CANCEL</button></div>
        </div></div>)}
        {deleteModal&&(<div className="overlay"><div className="modal">
          <div className="modal-title">REMOVE DUTY</div>
          <div style={{color:'var(--muted)',fontSize:13,margin:'8px 0 16px'}}>Remove <strong style={{color:'var(--text)'}}>{dName(deleteModal)}</strong> from the roster?</div>
          <div className="row">
            <button className="btn btn-red" onClick={()=>{setEditRoster(r=>r.filter(m=>m.id!==deleteModal.id));setDeleteModal(null);}}>REMOVE</button>
            <button className="btn btn-ghost" onClick={()=>setDeleteModal(null)}>CANCEL</button>
          </div>
        </div></div>)}
        <div className="card">
          <div className="card-title">DUTIES</div>
          <div className="card-sub">Drag ⠿ to reorder · ↑↓ as fallback · new Marines auto-place by rank</div>
          {er.map((m,i)=>(
            <div key={m.id}
              className={'mrow'+(overIdx===i?' drag-over':'')}
              draggable
              onDragStart={e=>onDragStart(e,i)}
              onDragOver={e=>onDragOver(e,i)}
              onDrop={e=>onDrop(e,i)}
              onDragEnd={onDragEnd}>
              <div className="drag-handle" title="Drag to reorder">⠿</div>
              <div className="mrow-num">{i+1}</div>
              <select className="sel" style={{width:70,fontSize:11,padding:'3px 4px'}} value={m.rank} onChange={e=>updateM(m.id,'rank',e.target.value)}>{RANKS.map(r=><option key={r}>{r}</option>)}</select>
              <input className="ii" style={{flex:1,minWidth:60,fontSize:11}} placeholder="LAST" defaultValue={m.lastName} onBlur={e=>updateM(m.id,'lastName',e.target.value)}/>
              <input className="ii" style={{width:50,fontSize:11}} placeholder="FIRST" defaultValue={m.firstName||''} onBlur={e=>updateM(m.id,'firstName',e.target.value)}/>
              <button className="btn-icon" disabled={!i} onClick={()=>moveUp(i)}>↑</button>
              <button className="btn-icon" disabled={i===er.length-1} onClick={()=>moveDown(i)}>↓</button>
              <button className="btn btn-red btn-sm" onClick={()=>setDeleteModal(m)}>✕</button>
            </div>
          ))}
          <hr/>
          <div className="card-sub">Add Duty  --  auto-places by rank</div>
          <div className="row">
            <select className="sel" style={{width:70,fontSize:11,padding:'4px 5px'}} value={newMRank} onChange={e=>setNewMRank(e.target.value)}>{RANKS.map(r=><option key={r}>{r}</option>)}</select>
            <input className="ii" style={{flex:1}} placeholder="LAST NAME*" ref={newLastRef}/>
            <input className="ii" style={{width:55}} placeholder="FIRST" ref={newFirstRef}/>
            <button className="btn btn-ghost btn-sm" onClick={addM}>+ ADD</button>
          </div>
        </div>
        <div className="card">
          <div className="card-title">TURN TIMER</div>
          <div className="card-sub">Minutes per pick. Timer runs server-side  --  tamper-proof. Default is 3.</div>
          <div className="timer-pills">
            {[1,2,3,4,5].map(n=>(<div key={n} className={'timer-pill'+(st.turnMins===n?' selected':'')} onClick={()=>patch({turnMins:n})}>{n}<div className="timer-pill-label">MIN</div></div>))}
          </div>
        </div>
        <div className="rowb">
          <div style={{color:'var(--muted)',fontSize:11}}>{er.length} duties · {st.turnMins||3} min turns</div>
          <button className="btn btn-gold" onClick={confirm}>CONFIRM →</button>
        </div>
      </div>
    );
  }

  // ── CALENDAR CONFIG ────────────────────────────────────────────────────────
  function CalCfg(){
    async function savePreAssign(){
      const mid=preAssignMarineRef.current;
      const reason=(preAssignReasonRef.current?.value||'').trim();
      if(!mid||!reason)return;
      const newPA={...preAssigned,[preAssignModal.day]:mid};
      const newPAR={...preAssignReasons,[preAssignModal.day]:reason};
      const m=marines.find(x=>x.id===mid);
      const pending=[...(st.pendingPreAssignNotifs||[]),{mid,title:'DUTY DATE ASSIGNED',body:`${dName(m)}: assigned duty on ${MONTHS[st.month]} ${preAssignModal.day}. Reason: ${reason}.`,icon:'📋'}];
      await patch({preAssigned:newPA,preAssignReasons:newPAR,pendingPreAssignNotifs:pending});
      setPreAssignModal(null);
    }
    function removePreAssign(d){
      const newPA={...preAssigned};delete newPA[d];
      const newPAR={...preAssignReasons};delete newPAR[d];
      patch({preAssigned:newPA,preAssignReasons:newPAR});
    }
    async function toggle(d){
      const k=dk(st.year,st.month,d),isNW=isNatWk(st.year,st.month,d);
      if(calMode==='blackout'){
        const nb=(st.blackouts||[]).includes(k)?(st.blackouts||[]).filter(x=>x!==k):[...(st.blackouts||[]),k];
        await patch({blackouts:nb,extraWk:(st.extraWk||[]).filter(x=>x!==k),workdays:(st.workdays||[]).filter(x=>x!==k)});
      } else if(calMode==='extra'&&!isNW){
        const ne=(st.extraWk||[]).includes(k)?(st.extraWk||[]).filter(x=>x!==k):[...(st.extraWk||[]),k];
        await patch({extraWk:ne,blackouts:(st.blackouts||[]).filter(x=>x!==k)});
      } else if(calMode==='workday'&&isNW){
        const nw=(st.workdays||[]).includes(k)?(st.workdays||[]).filter(x=>x!==k):[...(st.workdays||[]),k];
        await patch({workdays:nw});
      } else if(calMode==='assign'){
        if(preAssigned[d])removePreAssign(d);
        else{preAssignMarineRef.current='';setPreAssignModal({day:d});}
      }
    }
    async function confirm(){
      // Send any pending pre-assign notifications
      for(const n of(st.pendingPreAssignNotifs||[])){
        await api.addNotif(n.title,n.body,n.icon,n.mid);
      }
      const ad=getAllDates();
      const wk=ad.filter(d=>isWkDate(d));
      const wkAsgn=computeWkAssignees(marines,wk.length,st.history||{});
      const wkIds=[...wkAsgn.junior,...wkAsgn.ssgt,...wkAsgn.gysgt].map(m=>m.id);
      const dd=computeDoubleDuty(marines,ad.length,preAssigned,st.history||{});
      const preIds=new Set(Object.values(preAssigned));
      const remDays=ad.length-Object.keys(preAssigned).length;
      const eligCount=marines.filter(m=>!preIds.has(m.id)).length;
      if(remDays<eligCount){
        const roster=computeShortMonthRoster(marines,ad.length,preAssigned,st.history||{});
        await patch({weekendDates:wk,wkAssigneeIds:wkIds,wkAssignees:wkAsgn,doubleDuty:{},shortMonth:true,shortRoster:roster,pendingPreAssignNotifs:[],phase:'shortmonth'});
      } else {
        await patch({weekendDates:wk,wkAssigneeIds:wkIds,wkAssignees:wkAsgn,doubleDuty:dd,shortMonth:false,shortRoster:null,pendingPreAssignNotifs:[],phase:'wkpreview'});
      }
    }
    return(
      <div>
        {preAssignModal&&(<div className="overlay"><div className="modal">
          <div className="modal-title">ASSIGN  --  {MONTHS[st.month]} {preAssignModal.day}</div>
          <div className="card-sub">Notification will be sent when you hit CONFIRM on the calendar screen.</div>
          <div className="field"><label className="lbl">Duty</label>
            <select className="sel" defaultValue="" onChange={e=>{preAssignMarineRef.current=e.target.value;}}>
              <option value=""> --  Select  -- </option>
              {marines.map(m=><option key={m.id} value={m.id}>{dName(m)}</option>)}
            </select>
          </div>
          <div className="field"><label className="lbl">Reason</label><input className="inp" ref={preAssignReasonRef} defaultValue="" placeholder="e.g. Not on the gig that day"/></div>
          <div className="row mt"><button className="btn btn-gold" onClick={savePreAssign}>ASSIGN</button><button className="btn btn-ghost" onClick={()=>setPreAssignModal(null)}>CANCEL</button></div>
        </div></div>)}
        <div className="card">
          <div className="card-title">CALENDAR  --  {MONTHS[st.month].toUpperCase()} {st.year}</div>
          <div className="card-sub">Tap a mode then tap dates. Pre-assign notifications send when you hit CONFIRM.</div>
          <div className="row mt" style={{marginBottom:10,gap:5,flexWrap:'wrap'}}>
            {[['blackout','BLACKOUT','btn-red'],['extra','WEEKEND-STYLE','btn-gold'],['workday','WORKDAY',null],['assign','ASSIGN',null]].map(([mode,label,cls])=>(
              <button key={mode} className={'btn btn-sm '+(calMode===mode?(cls||'btn-ghost'):'btn-ghost')}
                style={calMode===mode&&!cls?mode==='workday'?{borderColor:'var(--blue)',color:'var(--blue)'}:{background:'#100520',borderColor:'#6a1a9a',color:'#c084fc'}:{}}
                onClick={()=>setCalMode(m=>m===mode?null:mode)}>{calMode===mode?'● ':''}{label}</button>
            ))}
          </div>
          <CalGrid year={st.year} month={st.month} renderCell={d=>{
            const k=dk(st.year,st.month,d),bo=(st.blackouts||[]).includes(k),ew=(st.extraWk||[]).includes(k),wd=(st.workdays||[]).includes(k),pa=preAssigned[d];
            const am=pa?marines.find(m=>m.id===pa):null;
            const cls='cc'+(bo?' bo':pa?' pre-assigned':wd?' workday':(ew||isNatWk(st.year,st.month,d))?' wk-cfg':' avail');
            return(<div key={d} className={cls} onClick={()=>toggle(d)}>
              <div className="c-num">{d}</div>
              {bo&&<div className="c-lbl">BLKOUT</div>}
              {ew&&!bo&&!pa&&<div className="c-lbl">WK+</div>}
              {wd&&!pa&&<div className="c-lbl">WKDAY</div>}
              {pa&&<div className="c-lbl">{am?.lastName||'ASSGN'}</div>}
            </div>);
          }}/>
          <div className="row mt" style={{fontSize:10,color:'var(--muted)',gap:10,flexWrap:'wrap'}}>
            <span style={{color:'var(--accent)'}}>■ Weekend</span>
            <span style={{color:'var(--blue)'}}>■ Workday</span>
            <span style={{color:'#c084fc'}}>■ Pre-assigned</span>
            <span style={{color:'#331010'}}>■ Blackout</span>
          </div>
        </div>
        {Object.keys(preAssigned).length>0&&(
          <div className="card">
            <div className="card-title">PRE-ASSIGNED {(st.pendingPreAssignNotifs||[]).length>0&&<span className="pill p-org" style={{marginLeft:6}}>NOTIFS PENDING</span>}</div>
            {Object.entries(preAssigned).map(([d,mid])=>{const m=marines.find(x=>x.id===mid);return(
              <div key={d} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontFamily:'var(--fm)',fontSize:11,minWidth:55}}>{MONTHS[st.month].slice(0,3)} {d}</span>
                <span style={{flex:1,fontSize:11}}>{m?dName(m):' -- '}</span>
                <span style={{color:'var(--muted)',fontSize:10,flex:1}}>{preAssignReasons[d]||''}</span>
                <button className="btn btn-red btn-sm" onClick={()=>removePreAssign(Number(d))}>✕</button>
              </div>
            );})}
          </div>
        )}
        <div className="rowb">
          <div className="row" style={{gap:6}}>
            {BackBtn()}
            <div style={{color:'var(--muted)',fontSize:11}}>{(st.blackouts||[]).length} blackout · {(st.extraWk||[]).length} WK+ · {(st.workdays||[]).length} workday · {Object.keys(preAssigned).length} pre-assigned</div>
          </div>
          <button className="btn btn-gold" onClick={confirm}>CONFIRM →</button>
        </div>
      </div>
    );
  }

  // ── SHORT MONTH ────────────────────────────────────────────────────────────
  function ShortMonthView(){
    const roster=st.shortRoster||{standing:{junior:[],ssgt:[],gysgt:[]},sittingOut:{junior:[],ssgt:[],gysgt:[]}};
    const standing=[...(roster.standing?.junior||[]),...(roster.standing?.ssgt||[]),...(roster.standing?.gysgt||[])];
    const sitting=[...(roster.sittingOut?.junior||[]),...(roster.sittingOut?.ssgt||[]),...(roster.sittingOut?.gysgt||[])];
    async function confirm(){
      const standIds=new Set(standing.map(m=>m.id));
      const activeMariners=marines.filter(m=>standIds.has(m.id));
      const ad=getAllDates();const wk=ad.filter(d=>isWkDate(d));
      const wkAsgn=computeWkAssignees(activeMariners,wk.length,st.history||{});
      const wkIds=[...wkAsgn.junior,...wkAsgn.ssgt,...wkAsgn.gysgt].map(m=>m.id);
      const dd=computeDoubleDuty(activeMariners,ad.length,preAssigned,st.history||{});
      await patch({marines:activeMariners,weekendDates:wk,wkAssigneeIds:wkIds,wkAssignees:wkAsgn,doubleDuty:dd,phase:'wkpreview'});
      for(const m of sitting)await api.addNotif('ROSTER UPDATE',`${dName(m)}: limited duty days this month  --  not on the roster for ${MONTHS[st.month]}. Rotation maintained.`,'📋',m.id);
    }
    return(
      <div>
        <div className="short-banner">
          <div style={{fontFamily:'var(--fh)',fontSize:12,letterSpacing:1,color:'var(--red)',marginBottom:4}}>⚠ SHORT MONTH</div>
          <div style={{fontSize:12,color:'#fca5a5'}}>{getAllDates().length} days · {marines.length} Marines · {sitting.length} sit out (60/25/15 rotation)</div>
        </div>
        <div className="card"><div className="card-title">STANDING DUTY ({standing.length})</div>{standing.map(m=><div key={m.id} className="short-marine">{dName(m)}</div>)}</div>
        <div className="card"><div className="card-title" style={{color:'var(--muted)'}}>SITTING OUT ({sitting.length})</div>{sitting.map(m=><div key={m.id} className="short-marine" style={{color:'var(--muted)'}}>{dName(m)}</div>)}</div>
        <div className="rowb mt">
          {BackBtn()}
          <button className="btn btn-gold btn-full" style={{flex:1,marginLeft:8}} onClick={confirm}>CONFIRM & NOTIFY →</button>
        </div>
      </div>
    );
  }

  // ── WK PREVIEW ────────────────────────────────────────────────────────────
  async function confirmWkPreview(){
    await patch({phase:'top5'});
    // Notify ALL duties
    await api.addNotif('SUBMISSIONS OPEN',`${MONTHS[st.month]} ${st.year}: Preferred Dates and Non-Availability selection is now open. Deadline is 1630 today.`,'📅');
    for(const m of[...(wkAssignees.junior||[]),...(wkAssignees.ssgt||[]),...(wkAssignees.gysgt||[])]){
      await api.addNotif('WEEKEND DUTY',`${dName(m)}: you are scheduled for weekend duty next month.`,'📅',m.id);
    }
    for(const mid of Object.keys(doubleDuty)){
      const m=marines.find(x=>x.id===mid);
      if(m)await api.addNotif('DOUBLE DUTY',`${dName(m)}: you are assigned double duty next month.`,'⚠',mid);
    }
  }

      <div>
        <div className="card">
          <div className="card-title">WEEKEND DUTY PREVIEW</div>

          {groups.map(g=>{const assigned=wkAssignees[g.key]||[];return(

              {!assigned.length&&<div style={{color:'var(--muted)',fontSize:11}}>None this month.</div>}
